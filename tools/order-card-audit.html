<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShatterApp — Order Card Audit</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0c0a09; color: #e7e5e4; padding: 1rem; }
  h1 { text-align: center; color: #fbbf24; margin-bottom: 0.5rem; font-size: 1.5rem; }
  .subtitle { text-align: center; color: #78716c; font-size: 0.8rem; margin-bottom: 1rem; }

  .toolbar { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; padding: 0.75rem; background: #1c1917; border-radius: 0.5rem; }
  .toolbar input[type=text] { flex: 1; min-width: 200px; padding: 0.5rem 0.75rem; border-radius: 0.375rem; border: 1px solid #44403c; background: #292524; color: #e7e5e4; font-size: 0.875rem; }
  .stats { color: #a8a29e; font-size: 0.8rem; }
  .stats .warn { color: #f97316; font-weight: 600; }

  .filter-pills { display: flex; gap: 0.375rem; flex-wrap: wrap; }
  .filter-pill { padding: 0.25rem 0.6rem; border-radius: 9999px; border: 1px solid #44403c; background: #292524; color: #a8a29e; cursor: pointer; font-size: 0.75rem; }
  .filter-pill.active { background: #fbbf24; color: #0c0a09; border-color: #fbbf24; font-weight: 600; }
  .filter-pill.warn { background: #431407; color: #f97316; border-color: #7c2d12; }
  .filter-pill.warn.active { background: #f97316; color: #0c0a09; border-color: #f97316; }

  .unit-card {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
    background: #1c1917;
    border-radius: 0.5rem;
    padding: 1rem;
    margin-bottom: 1rem;
    border: 1px solid #292524;
  }
  .unit-card.missing { border-color: #7c2d12; }
  .unit-card.missing-all { border-color: #ef4444; }

  .unit-meta {
    grid-column: 1 / -1;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #292524;
  }
  .unit-name { font-weight: 700; color: #fbbf24; font-size: 1rem; }
  .unit-swp { color: #78716c; font-size: 0.8rem; }
  .unit-type { font-size: 0.75rem; padding: 0.1rem 0.4rem; border-radius: 9999px; }
  .unit-type.Primary { background: #451a03; color: #fb923c; }
  .unit-type.Secondary { background: #1e3a5f; color: #60a5fa; }
  .unit-type.Support { background: #14532d; color: #4ade80; }

  .image-slot { display: flex; flex-direction: column; gap: 0.375rem; }
  .slot-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #78716c;
    display: flex;
    align-items: center;
    gap: 0.375rem;
  }
  .slot-label .badge {
    font-size: 0.65rem;
    padding: 0.1rem 0.35rem;
    border-radius: 9999px;
    font-weight: 700;
  }
  .badge-ok { background: #14532d; color: #4ade80; }
  .badge-missing { background: #450a0a; color: #f87171; }

  .img-wrapper {
    border-radius: 0.375rem;
    overflow: hidden;
    background: #292524;
    border: 1px solid #44403c;
    cursor: pointer;
    position: relative;
    aspect-ratio: auto;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .img-wrapper img {
    width: 100%;
    display: block;
    border-radius: 0.375rem;
  }
  .img-wrapper img:hover { opacity: 0.85; }
  .img-wrapper.missing-img {
    border-color: #7c2d12;
    min-height: 80px;
  }
  .missing-label {
    color: #ef4444;
    font-size: 0.75rem;
    text-align: center;
    padding: 0.75rem;
    line-height: 1.4;
  }
  .img-path {
    font-size: 0.65rem;
    color: #57534e;
    word-break: break-all;
    padding-top: 0.25rem;
    line-height: 1.3;
  }

  .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
  .pagination button { padding: 0.5rem 1rem; border-radius: 0.375rem; border: 1px solid #44403c; background: #292524; color: #e7e5e4; cursor: pointer; font-size: 0.875rem; }
  .pagination button:hover { background: #44403c; }
  .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
  .pagination .current { background: #fbbf24; color: #0c0a09; border-color: #fbbf24; font-weight: 600; }
  .page-info { display: flex; align-items: center; color: #78716c; font-size: 0.8rem; padding: 0 0.5rem; }

  /* Zoom */
  .zoom-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 99; display: none; cursor: pointer; }
  .zoom-img { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); max-width: 90vw; max-height: 90vh; z-index: 100; border-radius: 0.5rem; box-shadow: 0 0 60px rgba(0,0,0,0.8); pointer-events: none; }
  .zoom-caption { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 101; color: #e7e5e4; background: rgba(0,0,0,0.7); padding: 0.375rem 0.75rem; border-radius: 9999px; font-size: 0.8rem; pointer-events: none; }

  @media (max-width: 768px) {
    .unit-card { grid-template-columns: 1fr; }
    .unit-meta { grid-column: 1; }
  }
  @media (min-width: 769px) and (max-width: 1100px) {
    .unit-card { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<h1>Order Card Audit</h1>
<p class="subtitle">Verify order card images and model images per unit. Open via Vite dev server: <code>http://localhost:5173/tools/order-card-audit.html</code></p>

<div class="toolbar">
  <input type="text" id="search" placeholder="Search by name or SWP code…" />
  <div class="filter-pills" id="filterPills"></div>
  <span class="stats" id="stats"></span>
</div>

<div id="grid"></div>
<div class="pagination" id="pagination"></div>

<div class="zoom-backdrop" id="zoomBackdrop" onclick="closeZoom()"></div>
<img class="zoom-img" id="zoomImg" style="display:none" />
<div class="zoom-caption" id="zoomCaption" style="display:none"></div>

<script>
const PAGE_SIZE = 15;

let characters = [];
let filteredUnits = [];
let currentPage = 0;
let searchTerm = '';
let filter = 'all'; // 'all' | 'missing-order' | 'missing-model' | 'missing-any'

// Track which images actually loaded (keyed by src path)
const imageStatus = {}; // src → 'ok' | 'error'

async function init() {
  try {
    const res = await fetch('/data/characters.json');
    characters = await res.json();
  } catch (e) {
    document.getElementById('grid').innerHTML =
      '<p style="color:#ef4444;text-align:center;padding:2rem;">Failed to load characters.json. Open via Vite dev server at <strong>http://localhost:5173/tools/order-card-audit.html</strong></p>';
    return;
  }

  buildFilterPills();
  applyFilters();
}

function buildFilterPills() {
  const container = document.getElementById('filterPills');
  container.innerHTML = `
    <span class="filter-pill active" onclick="setFilter(this,'all')">All</span>
    <span class="filter-pill warn" onclick="setFilter(this,'missing-order')">Missing Order Card</span>
    <span class="filter-pill warn" onclick="setFilter(this,'missing-model')">Missing Model</span>
    <span class="filter-pill warn" onclick="setFilter(this,'missing-any')">Missing Either</span>
  `;
}

function setFilter(el, f) {
  filter = f;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentPage = 0;
  applyFilters();
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  currentPage = 0;
  applyFilters();
});

function applyFilters() {
  filteredUnits = characters.filter(c => {
    if (searchTerm) {
      const n = c.name.toLowerCase();
      const s = (c.swpCode || '').toLowerCase();
      if (!n.includes(searchTerm) && !s.includes(searchTerm)) return false;
    }
    const hasOrder = !!c.orderCard;
    const hasModel = !!c.model;
    if (filter === 'missing-order' && hasOrder) return false;
    if (filter === 'missing-model' && hasModel) return false;
    if (filter === 'missing-any' && hasOrder && hasModel) return false;
    return true;
  });

  updateStats();
  render();
}

function updateStats() {
  const totalOrder = characters.filter(c => c.orderCard).length;
  const totalModel = characters.filter(c => c.model).length;
  const total = characters.length;
  const missingOrder = total - totalOrder;
  const missingModel = total - totalModel;

  const el = document.getElementById('stats');
  let html = `${filteredUnits.length} shown / ${total} total`;
  if (missingOrder > 0) html += ` &middot; <span class="warn">${missingOrder} missing order card</span>`;
  if (missingModel > 0) html += ` &middot; <span class="warn">${missingModel} missing model</span>`;
  el.innerHTML = html;
}

function imgSlot(src, label, unitName) {
  const hasSrc = !!src;
  const badgeHtml = hasSrc
    ? `<span class="badge badge-ok">✓</span>`
    : `<span class="badge badge-missing">✗ missing</span>`;

  const wrapperClass = hasSrc ? '' : ' missing-img';
  const content = hasSrc
    ? `<img src="${src}" alt="${unitName} ${label}" loading="lazy"
         onclick="openZoom('${src.replace(/'/g,"\\'")}', '${unitName.replace(/'/g,"\\'")} — ${label}')"
         onerror="this.parentElement.classList.add('missing-img'); this.style.display='none'; this.insertAdjacentHTML('afterend','<div class=\\'missing-label\\'>Image not found<br><small>${src}</small></div>');" />`
    : `<div class="missing-label">No path in characters.json</div>`;

  return `
    <div class="image-slot">
      <div class="slot-label">${label} ${badgeHtml}</div>
      <div class="img-wrapper${wrapperClass}">${content}</div>
      ${hasSrc ? `<div class="img-path">${src}</div>` : ''}
    </div>`;
}

function render() {
  const start = currentPage * PAGE_SIZE;
  const page = filteredUnits.slice(start, start + PAGE_SIZE);

  const grid = document.getElementById('grid');
  if (page.length === 0) {
    grid.innerHTML = '<p style="color:#78716c;text-align:center;padding:2rem;">No units match the current filter.</p>';
    renderPagination();
    return;
  }

  grid.innerHTML = page.map(c => {
    const hasOrder = !!c.orderCard;
    const hasModel = !!c.model;
    const cardClass = (!hasOrder && !hasModel) ? 'missing-all' : (!hasOrder || !hasModel) ? 'missing' : '';

    return `
      <div class="unit-card ${cardClass}">
        <div class="unit-meta">
          <span class="unit-name">${c.name}</span>
          <span class="unit-type ${c.unitType}">${c.unitType || '?'}</span>
          <span class="unit-swp">${c.swpCode || ''} &middot; ID ${c.id}</span>
        </div>
        ${imgSlot(c.cardBack || null, 'Card Back', c.name)}
        ${imgSlot(c.orderCard || null, 'Order Card', c.name)}
        ${imgSlot(c.model || null, 'Model', c.name)}
      </div>`;
  }).join('');

  renderPagination();
}

function renderPagination() {
  const totalPages = Math.ceil(filteredUnits.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  const start = currentPage * PAGE_SIZE + 1;
  const end = Math.min((currentPage + 1) * PAGE_SIZE, filteredUnits.length);

  let html = `
    <button onclick="goPage(0)" ${currentPage === 0 ? 'disabled' : ''}>«</button>
    <button onclick="goPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>‹</button>
    <span class="page-info">${start}–${end} of ${filteredUnits.length}</span>`;

  const range = 2;
  for (let i = 0; i < totalPages; i++) {
    if (i === 0 || i === totalPages - 1 || Math.abs(i - currentPage) <= range) {
      html += `<button class="${i === currentPage ? 'current' : ''}" onclick="goPage(${i})">${i + 1}</button>`;
    } else if (Math.abs(i - currentPage) === range + 1) {
      html += `<span class="page-info">…</span>`;
    }
  }

  html += `
    <button onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>›</button>
    <button onclick="goPage(${totalPages - 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>»</button>`;

  pg.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openZoom(src, caption) {
  const backdrop = document.getElementById('zoomBackdrop');
  const img = document.getElementById('zoomImg');
  const cap = document.getElementById('zoomCaption');
  img.src = src;
  img.style.display = '';
  cap.textContent = caption;
  cap.style.display = '';
  backdrop.style.display = '';
}

function closeZoom() {
  document.getElementById('zoomBackdrop').style.display = 'none';
  document.getElementById('zoomImg').style.display = 'none';
  document.getElementById('zoomCaption').style.display = 'none';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeZoom(); });

init();
</script>
</body>
</html>
